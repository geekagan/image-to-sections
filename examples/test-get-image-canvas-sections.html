<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test: getImageCanvasSections</title>
  <style>
    body {
      font-family: monospace;
      padding: 16px;
      max-width: 1500px;
    }

    .case {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 16px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .log {
      background: #f5f5f5;
      padding: 8px;
      font-size: 12px;
      margin-top: 8px;
      white-space: pre-wrap;
      min-height: 32px;
      border-radius: 2px;
    }

    .pass {
      color: #2a2;
    }

    .fail {
      color: #c22;
    }

    .canvas-box {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
      min-height: 20px;
    }

    .canvas-box canvas {
      border: 1px solid #ccc;
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <h2>test: getImageCanvasSections</h2>
  <p style="font-size:12px;color:#666;">验证委托逻辑：cutDirection='horizontal' 走横切，'vertical' 走纵切。</p>

  <div class="case">
    <h3>Case 1 — cutDirection='horizontal', sectionHeight=150</h3>
    <input id="inputH" type="file" accept="image/*">
    <div class="log" id="logH">选择图片后显示结果…</div>
    <div class="canvas-box" id="boxH"></div>
  </div>

  <div class="case">
    <h3>Case 2 — cutDirection='vertical', sectionWidth=150</h3>
    <input id="inputV" type="file" accept="image/*">
    <div class="log" id="logV">选择图片后显示结果…</div>
    <div class="canvas-box" id="boxV"></div>
  </div>

  <script type="module">
    import { getImageCanvasSections, getImageCanvasSectionsH, getImageCanvasSectionsV } from '../src/index.js'

    const imageLoaded = img => new Promise(r => (img.onload = () => r(img)))

    function ok(label, pass, detail = '') {
      return `<span class="${pass ? 'pass' : 'fail'}">[${pass ? 'PASS' : 'FAIL'}] ${label}</span>${detail ? ' → ' + detail : ''}\n`
    }

    document.querySelector('#inputH').onchange = async (e) => {
      const file = e.target.files[0]
      const img = new Image(); img.crossOrigin = 'Anonymous'
      img.src = URL.createObjectURL(file)
      await imageLoaded(img)

      const sectionHeight = 150
      const canvases = getImageCanvasSections(img, { sectionHeight, cutDirection: 'horizontal' })
      const canvasesH = getImageCanvasSectionsH(img, sectionHeight)

      const expectedCount = Math.ceil(img.height / sectionHeight)
      const box = document.querySelector('#boxH')
      box.innerHTML = ''
      canvases.forEach(c => box.append(c))

      let log = `图片: ${img.width}×${img.height}  sectionHeight=${sectionHeight}\n`
      log += `期望切片数: ${expectedCount}  实际切片数: ${canvases.length}\n`
      log += ok('切片数正确', canvases.length === expectedCount, `${canvases.length} === ${expectedCount}`)
      log += ok('与 getImageCanvasSectionsH 结果数量一致', canvases.length === canvasesH.length)
      log += ok('全部返回 HTMLCanvasElement', canvases.every(c => c instanceof HTMLCanvasElement))
      log += ok('所有切片宽度等于图片宽度', canvases.every(c => c.width === img.width))
      document.querySelector('#logH').innerHTML = log
    }

    document.querySelector('#inputV').onchange = async (e) => {
      const file = e.target.files[0]
      const img = new Image(); img.crossOrigin = 'Anonymous'
      img.src = URL.createObjectURL(file)
      await imageLoaded(img)

      const sectionWidth = 150
      const canvases = getImageCanvasSections(img, { sectionWidth, cutDirection: 'vertical' })
      const canvasesV = getImageCanvasSectionsV(img, sectionWidth)

      const expectedCount = Math.ceil(img.width / sectionWidth)
      const box = document.querySelector('#boxV')
      box.innerHTML = ''
      canvases.forEach(c => box.append(c))

      let log = `图片: ${img.width}×${img.height}  sectionWidth=${sectionWidth}\n`
      log += `期望切片数: ${expectedCount}  实际切片数: ${canvases.length}\n`
      log += ok('切片数正确', canvases.length === expectedCount, `${canvases.length} === ${expectedCount}`)
      log += ok('与 getImageCanvasSectionsV 结果数量一致', canvases.length === canvasesV.length)
      log += ok('全部返回 HTMLCanvasElement', canvases.every(c => c instanceof HTMLCanvasElement))
      log += ok('所有切片高度等于图片高度', canvases.every(c => c.height === img.height))
      document.querySelector('#logV').innerHTML = log
    }
  </script>
</body>

</html>
